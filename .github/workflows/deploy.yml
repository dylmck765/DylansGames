name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebake the live ticker tape every 30 min during US market hours
    # (13:00-21:30 UTC covers 9:00-17:30 ET incl. DST drift), Mon-Fri.
    - cron: "*/30 13-21 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: the-pit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: the-pit/package-lock.json

      - run: npm ci

      - name: Fetch live ticker quotes (Yahoo Finance)
        run: node scripts/fetch-quotes.mjs
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /DylansGames
          NEXT_PUBLIC_SUPABASE_URL: https://qqjxffrbglbnyvwgxqxv.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_1tjHMogha1yiYlYeN6jN6g_ZID-IODS

      - uses: actions/upload-pages-artifact@v3
        with:
          path: the-pit/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
